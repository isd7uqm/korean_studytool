<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>韩语彦文积木 (手机适用版)</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --primary-color: #4a90e2;
            --tile-bg: #ffffff;
            --initial-color: #ff7675;
            --vowel-color: #55efc4;
            --final-color: #fdcb6e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            /* 防止移动端双击缩放和长按选中文本 */
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 上半部分：固定在顶部 */
        .top-board {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg-color);
            padding: 15px 15px 10px 15px;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }

        /* 下半部分：独立滚动区域 */
        .scroll-board {
            flex-grow: 1;
            overflow-y: auto; 
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        h1 { color: #2d3436; margin: 0 0 5px 0; font-size: 22px; }
        p { color: #636e72; margin: 0 0 10px 0; font-size: 13px; }

        .workbench {
            display: flex;
            gap: 10px; /* 移动端减小间距 */
            margin-bottom: 10px;
            background: #dfe6e9;
            padding: 15px 20px;
            border-radius: 20px;
            width: 100%;
            max-width: 320px;
            box-sizing: border-box;
            justify-content: space-between;
        }

        .drop-zone {
            flex: 1; /* 自适应宽度 */
            max-width: 80px;
            height: 85px;
            border: 3px dashed #b2bec3;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            background: rgba(255,255,255,0.5);
            transition: all 0.2s;
            position: relative;
            color: #2d3436;
        }

        .drop-zone .romaji-hint { font-size: 13px; color: #b2bec3; margin-top: 2px; }
        
        /* 选中时的动画反馈 */
        .drop-zone.active-pop {
            transform: scale(1.1);
            border-color: var(--primary-color);
            background: #fff;
        }

        .drop-zone::after {
            content: attr(data-label);
            position: absolute;
            bottom: -20px;
            font-size: 10px;
            color: #636e72;
            white-space: nowrap;
        }

        .btn-clear-final {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 22px;
            height: 22px;
            background: #ff7675;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            display: none; 
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 5;
        }

        .result-container {
            width: 100%;
            max-width: 320px;
            box-sizing: border-box;
            text-align: center;
            background: white;
            padding: 10px 20px 15px 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #result-char { font-size: 60px; font-weight: bold; color: #2d3436; margin: 0; cursor: pointer; transition: transform 0.2s; line-height: 1.2; }
        #result-char:active { transform: scale(0.95); } /* 移动端点击反馈 */
        #result-romaji { font-size: 18px; color: var(--primary-color); font-family: monospace; font-weight: bold; letter-spacing: 2px; margin-bottom: 10px; }

        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .btn-play {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px; /* 加大触控面积 */
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(74, 144, 226, 0.3);
            width: 100%;
        }
        .btn-play:active { background-color: #357abd; transform: scale(0.98); }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px; /* 稍微调大 */
            color: #636e72;
            width: 100%;
            justify-content: center;
        }
        .speed-control input[type=range] {
            flex-grow: 1;
            max-width: 150px;
        }

        .palette {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .section-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; color: #b2bec3; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .tiles { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; justify-content: flex-start; }

        .tile {
            width: calc((100% - 32px) / 5); /* 一排约5个，自适应 */
            min-width: 45px;
            height: 50px;
            background: var(--tile-bg);
            border: 2px solid #eee;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer; /* 改为普通的 pointer */
            transition: all 0.1s;
        }

        .tile .char { font-size: 18px; font-weight: bold; color: #2d3436; }
        .tile .rom { font-size: 11px; color: #b2bec3; }
        
        .tile.initial { border-bottom: 4px solid var(--initial-color); }
        .tile.vowel { border-bottom: 4px solid var(--vowel-color); }
        .tile.final { border-bottom: 4px solid var(--final-color); }
        
        /* 移动端点击反馈，取代 hover */
        .tile:active { transform: scale(0.9); background-color: #f8f9fa; }

    </style>
</head>
<body>

    <div class="top-board">
        <h1>彦文积木 🧱</h1>
        <p>点击下方字母块，自动拼装发音</p>

        <div class="workbench">
            <div id="initial-target" class="drop-zone" data-label="辅音(初声)">
                <span class="char">?</span><span class="romaji-hint"></span>
            </div>
            <div id="vowel-target" class="drop-zone" data-label="元音(中声)">
                <span class="char">?</span><span class="romaji-hint"></span>
            </div>
            <div id="final-target" class="drop-zone" data-label="收音(可选)">
                <button class="btn-clear-final" id="clear-final-btn" onclick="clearFinal(event)">×</button>
                <span class="char" style="color:#ccc">-</span><span class="romaji-hint"></span>
            </div>
        </div>

        <div class="result-container">
            <div id="result-char" onclick="speak()">가</div>
            <div id="result-romaji">[ ga ]</div>
            
            <div class="controls">
                <button class="btn-play" onclick="speak()">🔊 播放发音</button>
                <div class="speed-control">
                    <span>🐢</span>
                    <input type="range" id="speech-rate" min="0.5" max="1.5" step="0.1" value="1.0" oninput="updateRateLabel(this.value)">
                    <span>🐇</span>
                    <span id="rate-label" style="display:inline-block; width:30px; text-align:right;">1.0x</span>
                </div>
            </div>
        </div>
    </div>

    <div class="scroll-board">
        <div class="palette">
            <div class="section-title" style="color: var(--initial-color)">初声 (辅音)</div>
            <div class="tiles" id="initial-pool"></div>
            
            <div class="section-title" style="color: var(--vowel-color)">中声 (元音)</div>
            <div class="tiles" id="vowel-pool"></div>

            <div class="section-title" style="color: var(--final-color)">终声 / 收音 (底部)</div>
            <div class="tiles" id="final-pool"></div>
        </div>
    </div>

    <script>
        const initialsData = [
            { char: 'ㄱ', rom: 'g' }, { char: 'ㄲ', rom: 'kk' }, { char: 'ㄴ', rom: 'n' }, { char: 'ㄷ', rom: 'd' }, { char: 'ㄸ', rom: 'tt' }, { char: 'ㄹ', rom: 'r' }, { char: 'ㅁ', rom: 'm' }, { char: 'ㅂ', rom: 'b' }, { char: 'ㅃ', rom: 'pp' }, { char: 'ㅅ', rom: 's' }, { char: 'ㅆ', rom: 'ss' }, { char: 'ㅇ', rom: '' }, { char: 'ㅈ', rom: 'j' }, { char: 'ㅉ', rom: 'jj' }, { char: 'ㅊ', rom: 'ch' }, { char: 'ㅋ', rom: 'k' }, { char: 'ㅌ', rom: 't' }, { char: 'ㅍ', rom: 'p' }, { char: 'ㅎ', rom: 'h' }
        ];

        const vowelsData = [
            { char: 'ㅏ', rom: 'a' }, { char: 'ㅐ', rom: 'ae' }, { char: 'ㅑ', rom: 'ya' }, { char: 'ㅒ', rom: 'yae' }, { char: 'ㅓ', rom: 'eo' }, { char: 'ㅔ', rom: 'e' }, { char: 'ㅕ', rom: 'yeo' }, { char: 'ㅖ', rom: 'ye' }, { char: 'ㅗ', rom: 'o' }, { char: 'ㅘ', rom: 'wa' }, { char: 'ㅙ', rom: 'wae' }, { char: 'ㅚ', rom: 'oe' }, { char: 'ㅛ', rom: 'yo' }, { char: 'ㅜ', rom: 'u' }, { char: 'ㅝ', rom: 'wo' }, { char: 'ㅞ', rom: 'we' }, { char: 'ㅟ', rom: 'wi' }, { char: 'ㅠ', rom: 'yu' }, { char: 'ㅡ', rom: 'eu' }, { char: 'ㅢ', rom: 'ui' }, { char: 'ㅣ', rom: 'i' }
        ];

        const finalsData = [
            { char: '', rom: '' },
            { char: 'ㄱ', rom: 'k' }, { char: 'ㄲ', rom: 'k' }, { char: 'ㄳ', rom: 'k' }, { char: 'ㄴ', rom: 'n' }, { char: 'ㄵ', rom: 'n' }, { char: 'ㄶ', rom: 'n' }, { char: 'ㄷ', rom: 't' }, { char: 'ㄹ', rom: 'l' }, { char: 'ㄺ', rom: 'k' }, { char: 'ㄻ', rom: 'm' }, { char: 'ㄼ', rom: 'p' }, { char: 'ㄽ', rom: 'l' }, { char: 'ㄾ', rom: 'l' }, { char: 'ㄿ', rom: 'p' }, { char: 'ㅀ', rom: 'l' }, { char: 'ㅁ', rom: 'm' }, { char: 'ㅂ', rom: 'p' }, { char: 'ㅄ', rom: 'p' }, { char: 'ㅅ', rom: 't' }, { char: 'ㅆ', rom: 't' }, { char: 'ㅇ', rom: 'ng' }, { char: 'ㅈ', rom: 't' }, { char: 'ㅊ', rom: 't' }, { char: 'ㅋ', rom: 'k' }, { char: 'ㅌ', rom: 't' }, { char: 'ㅍ', rom: 'p' }, { char: 'ㅎ', rom: 't' }
        ];

        let currentInitialIdx = 0; 
        let currentVowelIdx = 0;   
        let currentFinalIdx = 0;
        let currentRate = 1.0;  

        function init() {
            const iPool = document.getElementById('initial-pool');
            initialsData.forEach((item, index) => iPool.appendChild(createTile(item, index, 'initial')));

            const vPool = document.getElementById('vowel-pool');
            vowelsData.forEach((item, index) => vPool.appendChild(createTile(item, index, 'vowel')));

            const fPool = document.getElementById('final-pool');
            for (let i = 1; i < finalsData.length; i++) {
                fPool.appendChild(createTile(finalsData[i], i, 'final'));
            }
            
            // 初始状态
            selectTile(initialsData[0], 0, 'initial', false);
            selectTile(vowelsData[0], 0, 'vowel', false);
        }

        // 修改为点击事件驱动
        function createTile(item, index, type) {
            const div = document.createElement('div');
            div.className = `tile ${type}`;
            div.innerHTML = `<span class="char">${item.char}</span><span class="rom">${item.rom || '-'}</span>`;
            
            // 绑定点击事件，替代原有的 ondragstart
            div.onclick = () => {
                selectTile(item, index, type, true);
            };
            return div;
        }

        // 处理积木选择并放入上方工作台
        function selectTile(item, index, type, animate = true) {
            const targetEl = document.getElementById(type + '-target');
            
            // 更新显示
            targetEl.querySelector('.char').innerText = item.char;
            targetEl.querySelector('.char').style.color = '#2d3436';
            targetEl.querySelector('.romaji-hint').innerText = item.rom;

            // 简单的动画反馈
            if (animate) {
                targetEl.classList.add('active-pop');
                setTimeout(() => targetEl.classList.remove('active-pop'), 200);
            }

            // 更新状态数据
            if (type === 'initial') currentInitialIdx = index;
            if (type === 'vowel') currentVowelIdx = index;
            if (type === 'final') {
                currentFinalIdx = index;
                document.getElementById('clear-final-btn').style.display = 'flex';
            }

            updateHangul();
        }

        function clearFinal(e) {
            if(e) e.stopPropagation(); // 阻止事件冒泡
            currentFinalIdx = 0;
            const finalEl = document.getElementById('final-target');
            finalEl.querySelector('.char').innerText = '-';
            finalEl.querySelector('.char').style.color = '#ccc';
            finalEl.querySelector('.romaji-hint').innerText = '';
            document.getElementById('clear-final-btn').style.display = 'none';
            updateHangul();
        }

        function updateHangul() {
            const code = 0xAC00 + (currentInitialIdx * 588) + (currentVowelIdx * 28) + currentFinalIdx;
            const hangulChar = String.fromCharCode(code);
            document.getElementById('result-char').innerText = hangulChar;

            const initialRom = initialsData[currentInitialIdx].rom;
            const vowelRom = vowelsData[currentVowelIdx].rom;
            const finalRom = finalsData[currentFinalIdx].rom;
            document.getElementById('result-romaji').innerText = `[ ${initialRom}${vowelRom}${finalRom} ]`;
        }

        function updateRateLabel(val) {
            currentRate = parseFloat(val);
            document.getElementById('rate-label').innerText = currentRate.toFixed(1) + 'x';
        }

        function speak() {
            const text = document.getElementById('result-char').innerText;
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ko-KR'; 
            msg.rate = currentRate; 
            window.speechSynthesis.cancel(); 
            window.speechSynthesis.speak(msg);
        }

        init();
    </script>
</body>
